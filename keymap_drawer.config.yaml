# Configuración para keymap-drawer (https://github.com/caksoylar/keymap-drawer)
#
# El keymap (config/lily58.keymap) usa keycodes US, pero macOS está configurado
# en la distribución "Español — ISO". Por eso el carácter que sale de cada tecla
# NO coincide con el nombre del keycode US. Aquí reetiquetamos cada binding con
# el símbolo que REALMENTE produce ES-ISO, para que la imagen sea fiel al teclado.
#
# Regenerar:
#   keymap -c keymap_drawer.config.yaml parse -z config/lily58.keymap > keymap-drawer/lily58.yaml
#   keymap -c keymap_drawer.config.yaml draw keymap-drawer/lily58.yaml   > keymap-drawer/lily58.svg
# (o simplemente hacer push: el workflow .github/workflows/draw-keymaps.yml lo hace solo)

parse_config:
  raw_binding_map:
    # ── Base (Mac): teclas cuya salida en ES-ISO difiere del keycode US ──
    "&kp SEMI": "Ñ"
    "&kp SQT": { t: "´", s: "¨" }   # tecla muerta: acento agudo / diéresis (Shift)
    "&kp FSLH": { t: "-", s: "_" }
    "&kp COMMA": { t: ",", s: ";" }
    "&kp DOT": { t: ".", s: ":" }
    "&bspc_qmark": { t: "BACKSPACE", s: "?" }   # mod-morph: Backspace / con Shift → ?

    # ── Hold-tap &hc: tap = la letra, mantener (~0.3s) = ⌘ + la letra ──
    "&hc LG(Z) Z": { t: "Z", h: "⌘Z" }
    "&hc LG(X) X": { t: "X", h: "⌘X" }
    "&hc LG(C) C": { t: "C", h: "⌘C" }
    "&hc LG(V) V": { t: "V", h: "⌘V" }
    "&hc LG(A) A": { t: "A", h: "⌘A" }
    "&hc LG(S) S": { t: "S", h: "⌘S" }
    "&hc LG(F) F": { t: "F", h: "⌘F" }
    "&hc LG(T) T": { t: "T", h: "⌘T" }
    "&hc LG(W) W": { t: "W", h: "⌘W" }
    "&hc LG(R) R": { t: "R", h: "⌘R" }

    # ── High: símbolos de programación vía combos Shift/Option de Mac ES-ISO ──
    "&kp LC(LG(SPACE))": "😀 Emoji"       # selector de emojis de macOS
    "&kp LS(MINUS)": "?"
    # macOS intercambia los scancodes GRAVE y NON_US_BACKSLASH en teclados ISO:
    # por eso < > van por GRAVE/LS(GRAVE) y \ por LA(NON_US_BACKSLASH).
    "&kp LA(NON_US_BACKSLASH)": "\\"
    "&kp RBKT": "+"
    "&kp LS(RBKT)": "*"
    "&kp LA(LBKT)": "["
    "&kp LA(RBKT)": "]"
    "&es_grave": "`"                      # macro tecla muerta ` + espacio
    "&kp MINUS": { t: "'", s: "?" }
    "&kp GRAVE": "<"
    "&kp LS(GRAVE)": ">"
    "&kp LA(SQT)": "{"
    "&kp LA(BSLH)": "}"
    "&es_caret": "^"                      # macro tecla muerta ^ + espacio
    "&kp LS(EQUAL)": "¿"
    "&kp EQUAL": "¡"
    # Atrás/adelante: botones 4/5 del mouse por HID (como los botones laterales
    # de un mouse Logitech MX) — independientes de la distribución y de atajos ⌘.
    "&mkp MB4": "🖱◀\natrás"
    "&mkp MB5": "🖱▶\nadelante"

    # ── Low ──
    "&kp LC(LEFT)": "⌃←\nescritorio"    # cambiar de escritorio en macOS
    "&kp LC(RIGHT)": "⌃→\nescritorio"
    "&kp LC(LG(Q))": "🔒\nLock"         # ⌃⌘Q: bloquear pantalla de macOS
    "&kp C_PLAY_PAUSE": "⏯\nplay/pausa" # teclas interiores sobre los pulgares
    "&kp C_MUTE": "🔇\nmute"
    "&studio_unlock": "Studio\nUnlock"
