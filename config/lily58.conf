# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_KEYBOARD_NAME="Allium58_1"

# Pantallas nice!view (shield local en boards/shields/nice_view_gem)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Widgets de estado en blanco sobre negro (SIG/BAT arriba, perfiles/capa abajo).
# El arte nocturno tiene paleta fija y no se invierte con este flag.
CONFIG_NICE_VIEW_WIDGET_INVERTED=y