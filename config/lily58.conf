# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_KEYBOARD_NAME="Allium58_1"

# Pantallas nice!view (shield local en boards/shields/nice_view_gem)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# SIN CONFIG_NICE_VIEW_WIDGET_INVERTED: el pipeline del nice!view en zmk main
# ya invierte los colores LVGL al panel (blanco LVGL = pixel negro), así que
# los widgets salen blanco-sobre-negro por sí solos (igual que el gem stock).

# Deep sleep: tras 15 min de inactividad corta BT y apaga periféricos.
# Se despierta con cualquier tecla (esa pulsación se pierde) y tarda ~1-2 s
# en reconectar. Aplica a ambas mitades (comparten este .conf).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000